name: Morning Briefing

on:
  schedule:
    # JST 08:00 = UTC 23:00 (前日)
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Secrets からカレンダートークンファイルを復元
      - name: Write calendar tokens
        run: |
          echo '${{ secrets.CALENDAR_TOKEN_JSON }}' > calendar_token.json
          echo '${{ secrets.CALENDAR_TOKEN_SECONDARY_JSON }}' > calendar_token_secondary.json

      - name: Send morning briefing
        run: npx tsx src/sendBrief.ts
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STOCK_SYMBOLS: ${{ vars.STOCK_SYMBOLS || 'NVDA,MSFT,GOOGL,META,AMZN,AMD,SMCI,ARM,PLTR,TSM' }}
          TZ: Asia/Tokyo
